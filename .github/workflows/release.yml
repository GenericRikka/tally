name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. Test — Linux ───────────────────────────────────────────────────────
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build gcc

      - name: Build & test
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          bash tests/run_tests.sh ./build/tally

  # ── 2. Test — Windows ─────────────────────────────────────────────────────
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Build & test
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          bash tests/run_tests.sh ./build/tally.exe

  # ── 3. Build release binary — Linux ──────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: [test-linux, test-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build gcc

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tally-linux-x86_64
          path: build/tally

  # ── 4. Build release binary — Windows ────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [test-linux, test-windows]
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tally-windows-x86_64
          path: build/tally.exe

  # ── 5. Publish release ────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: tally-linux-x86_64
          path: dist/linux

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: tally-windows-x86_64
          path: dist/windows

      - name: Prepare assets
        run: |
          TAG=${GITHUB_REF_NAME}
          chmod +x dist/linux/tally
          mv dist/linux/tally       tally-${TAG}-linux-x86_64
          mv dist/windows/tally.exe tally-${TAG}-windows-x86_64.exe
          git archive --format=tar --prefix=tally-${TAG}/ HEAD | xz > tally-${TAG}-source.tar.xz
          git archive --format=zip --prefix=tally-${TAG}/ -o tally-${TAG}-source.zip HEAD

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            tally-*-linux-x86_64
            tally-*-windows-x86_64.exe
            tally-*-source.tar.xz
            tally-*-source.zip
